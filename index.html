<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div id="login-section">
        <h2>Área Restrita (Login)</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="E-mail (aluno@fiap.com.br)" required>
            <input type="password" id="password" placeholder="Senha (1234)" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div id="app-section">
        <h2 id="welcome-message"></h2>
        <button id="btn-prompt">Avalie a Sprint</button>

        <hr>
        
        <div class="slider">
            <h3>Slideshow de Gatos</h3>
            <img id="slide-img" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=600&h=400&fit=crop" alt="Gato">
            <button id="btn-next">Próximo Gatinho</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
